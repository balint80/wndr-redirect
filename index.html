<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>W:NDR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 480px;
    }

    .app-icon {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      margin: 0 auto 24px;
      background: #e94560;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      opacity: 0.75;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      color: white;
      transition: transform 0.2s, opacity 0.2s;
      margin: 8px;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .btn-ios {
      background: #000000;
      border: 2px solid #444;
    }

    .btn-android {
      background: #01875f;
    }

    .btn-both {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .redirecting {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-top: 16px;
    }

    .spinner {
      margin: 16px auto;
      width: 36px;
      height: 36px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="app-icon">
    <img src="wndr_icon.jpg" alt="W:NDR" />
  </div>

  <h1>W:NDR</h1>
  <p>Élő nyomkereső játékok - kalandok képernyőn innen és túl</p>

  <div id="redirect-ui">
    <div class="spinner"></div>
    <p class="redirecting">Detecting your device...</p>
  </div>

  <!-- Fallback buttons (shown if device not detected) -->
  <div id="fallback-buttons" class="btn-both" style="display:none;">
    <a id="ios-btn" class="btn btn-ios" href="#" target="_blank">
      Letöltés iPhone-ra
    </a>
    <a id="android-btn" class="btn btn-android" href="#" target="_blank">
      Letöltés Android-ra
    </a>
  </div>

</div>

<script>
  // ============================================================
  // 🔧 CONFIGURE YOUR STORE LINKS HERE
  // ============================================================
  const APP_STORE_URL    = "https://apps.apple.com/us/app/w-ndr/id6767869241";
  const PLAY_STORE_URL   = "https://play.google.com/store/apps/details?id=com.WNDR.TndrKaland";
  // ============================================================

  function detectAndRedirect() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;

    const isIOS     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    const isAndroid = /android/i.test(ua);

    const iosBtn     = document.getElementById("ios-btn");
    const androidBtn = document.getElementById("android-btn");

    // Set fallback button hrefs
    iosBtn.href     = APP_STORE_URL;
    androidBtn.href = PLAY_STORE_URL;

    if (isIOS) {
      // Redirect to App Store
      setTimeout(() => {
        window.location.href = APP_STORE_URL;
      }, 1200);

    } else if (isAndroid) {
      // Redirect to Play Store
      setTimeout(() => {
        window.location.href = PLAY_STORE_URL;
      }, 1200);

    } else {
      // Desktop or unknown — show both buttons
      document.getElementById("redirect-ui").style.display   = "none";
      document.getElementById("fallback-buttons").style.display = "flex";
    }
  }

  // Run on page load
  window.addEventListener("load", detectAndRedirect);
</script>

</body>
</html>
